services:
  meal-planner:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ../docker_data/meal-planner/state:/app/state
      - ../docker_data/meal-planner/traces:/app/traces
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-openrouter/anthropic/claude-sonnet-4.5}
      - RECIPE_FINDER_MODEL=${RECIPE_FINDER_MODEL:-openrouter/google/gemini-2.5-flash:online}
    restart: unless-stopped
